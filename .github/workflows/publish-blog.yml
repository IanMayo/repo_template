name: Publish blog on merge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  publish-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can diff this push (before..after) and act only on
          # the blog content it introduced.
          fetch-depth: 0

      - name: Collect blog posts introduced by this push
        id: sync
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          rm -rf _blog_publish
          mkdir -p _blog_publish/blog/_posts _blog_publish/blog/assets
          shopt -s nullglob

          # Act only on the specs/<NNN>/blog/ folders this push changed (keep_files
          # below preserves everything already published). Fall back to scanning all
          # specs when there is no usable base commit -- a manual workflow_dispatch or
          # a first/force push -- so a manual run can rebuild everything.
          if [ -n "${BEFORE:-}" ] && [ "${BEFORE}" != "0000000000000000000000000000000000000000" ] \
             && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            changed_specs="$(git diff --name-only "${BEFORE}" "${AFTER}" -- specs \
                             | grep -E '^specs/[^/]+/blog/' \
                             | sed -E 's#^(specs/[^/]+)/blog/.*#\1/blog#' | sort -u)"
          else
            changed_specs="$(printf '%s\n' specs/*/blog | sort -u)"
          fi

          found=0
          for specdir in ${changed_specs}; do
            [ -f "$specdir/post.md" ] || continue
            found=1
            spec="$(basename "$(dirname "$specdir")")"
            # Date: first YYYY-MM-DD on the front-matter `date:` line, else today.
            date="$(grep -m1 -iE '^date:' "$specdir/post.md" 2>/dev/null \
                    | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -n1 || true)"
            [ -n "$date" ] || date="$(date +%F)"
            post="_blog_publish/blog/_posts/${date}-${spec}.md"
            cp "$specdir/post.md" "$post"
            if [ -d "$specdir/screenshots" ]; then
              mkdir -p "_blog_publish/blog/assets/${spec}"
              cp -r "$specdir/screenshots/." "_blog_publish/blog/assets/${spec}/"
              # Rewrite in-post image paths to the published, baseurl-safe location
              # relative to the post URL (/blog/<spec>/ -> ../assets/<spec>/).
              sed -i "s#screenshots/#../assets/${spec}/#g" "$post"
            fi
            echo "Prepared post: ${date}-${spec}.md"
          done
          echo "found=$found" >> "$GITHUB_OUTPUT"

      - name: Publish to gh-pages
        if: steps.sync.outputs.found == '1'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_blog_publish
          publish_branch: gh-pages
          keep_files: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Publish blog posts for ${{ github.sha }}"

      - name: Nothing to publish
        if: steps.sync.outputs.found != '1'
        run: echo "No specs/*/blog/post.md found — nothing to publish."
