<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" role="img"
     aria-label="One merge to main runs one deploy that publishes the landing, app, and blog">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#1b2735"/>
    </linearGradient>
    <style>
      .lbl { font-family: system-ui, sans-serif; fill: #e6edf3; }
      .box { fill: rgba(255,255,255,.06); stroke: #2f81f7; stroke-width: 2; rx: 12; }
      .out { fill: rgba(126,231,135,.10); stroke: #7ee787; stroke-width: 2; rx: 12; }
      .arrow { stroke: #8b949e; stroke-width: 2; marker-end: url(#a); fill: none; }
    </style>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/>
    </marker>
  </defs>

  <rect width="820" height="360" fill="url(#bg)"/>
  <text x="410" y="48" text-anchor="middle" class="lbl" font-size="26" font-weight="700">
    One merge → one deploy run → gh-pages
  </text>

  <rect class="box" x="40"  y="140" width="170" height="64"/>
  <text x="125" y="178" text-anchor="middle" class="lbl" font-size="18">push to main</text>

  <rect class="box" x="290" y="140" width="190" height="64"/>
  <text x="385" y="172" text-anchor="middle" class="lbl" font-size="18">deploy.yml</text>
  <text x="385" y="192" text-anchor="middle" class="lbl" font-size="12" opacity=".8">single gh-pages push</text>

  <rect class="out" x="610" y="60"  width="170" height="56"/>
  <text x="695" y="94"  text-anchor="middle" class="lbl" font-size="17">/ landing</text>
  <rect class="out" x="610" y="152" width="170" height="56"/>
  <text x="695" y="186" text-anchor="middle" class="lbl" font-size="17">/app/</text>
  <rect class="out" x="610" y="244" width="170" height="56"/>
  <text x="695" y="278" text-anchor="middle" class="lbl" font-size="17">/blog/</text>

  <path class="arrow" d="M210,172 L286,172"/>
  <path class="arrow" d="M480,172 L606,88"/>
  <path class="arrow" d="M480,172 L606,180"/>
  <path class="arrow" d="M480,172 L606,272"/>
</svg>
